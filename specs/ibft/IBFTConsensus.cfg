\* TLC configuration for IBFTConsensus.
\*
\* To check: install the VS Code TLA+ extension (alygin.vscode-tlaplus),
\* right-click this file and choose "Check model with TLC".
\*
\* Expected result with MC_MaxRound=2:
\*   Agreement              — PASSES  (safety: no two nodes decide differently)
\*   CommitImpliesPrepareQuorum — PASSES
\*   LockConsistency        — PASSES
\*   QuorumIntersection     — PASSES
\*   TypeOK                 — PASSES
\*   Termination            — NOT checked here (needs fairness constraints)

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    Validators   <- MC_Validators
    ByzValidators <- MC_ByzValidators
    Blocks       <- MC_Blocks
    MaxRound     <- MC_MaxRound

INVARIANTS
    TypeOK
    Agreement
    CommitImpliesPrepareQuorum
    LockConsistency
    QuorumIntersection
