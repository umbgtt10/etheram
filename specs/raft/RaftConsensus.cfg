\* TLC configuration for RaftConsensus.
\*
\* To run the quick check (under 30 seconds):
\*   scripts\raft_run_tla_quick.ps1
\*
\* To verify liveness (Termination) manually:
\*   Change SPECIFICATION to FairSpec and add PROPERTIES Termination below.

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

CONSTANTS
    Nodes      <- MC_Nodes
    MaxTerm    <- MC_MaxTerm
    MaxEntries <- MC_MaxEntries

INVARIANTS
    TypeOK
    ElectionSafety
    VoteOnce
    LeaderTermOK
    LogSafety
    LeaderCompleteness
